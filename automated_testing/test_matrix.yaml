  - id: GW-AUTO-NFT-002
    name: "NFT send happy path"
    source_manual_id: GW-MAN-NFT-002
    tags: [nft, p1]
    max_steps: 25
    timeout: 240
    steps:
      - action: |
          Navigate to the NFT section. If no NFTs are available, COMPLETE and
