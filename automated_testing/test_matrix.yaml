# =============================================================================
# Gleec Wallet — Skyvern Automated Test Matrix (Web Only)
# =============================================================================
#
# Converted from GLEEC_WALLET_MANUAL_TEST_CASES.md for the Skyvern + Ollama
# vision-based QA runner. Only Grade-A (fully automatable) and Grade-B
# (partially automatable UI steps) tests are included.
#
# Platform scope: Web (Chrome) — Flutter canvas-rendered application.
# Test assets:    DOC/MARTY testnet coins via in-app faucet.
#
# IMPORTANT: Before running, fill in the values under `test_data` with
# your actual environment-specific addresses, seeds, and credentials.
#
# =============================================================================

config:
  base_url: "https://app.gleecwallet.com"     # Or your QA staging URL
  default_engine: "skyvern-2.0"
  max_steps_per_test: 30
  timeout_per_test: 180
  screenshot_on_complete: true
  video_recording: true

# ---------------------------------------------------------------------------
# TEST DATA — Fill these in with your QA environment values
# ---------------------------------------------------------------------------
test_data:
  wallet_password: "QaTestPass!2026"
  wallet_password_weak: "abc"
  import_seed_12: "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"
  doc_recipient_address: "RPDPE1XqGuHXSJn9q6VAaGDoRVMEwAYjT3"
  marty_recipient_address: "RQCyFA4cAyjpfzcCGnxNxC4YTQsRDVPzec"
  invalid_address: "RThisIsNotAValidAddress12345"
  wrong_network_address: "0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18"
  evm_token_contract: "0xReplaceMeWithTestTokenContract"  # Replace with a real testnet ERC-20 contract for your environment
  self_address: "WILL_BE_CAPTURED_DURING_TEST"
  alt_doc_address: "RKXzCCaT5ukqnyJBKTr9KyEpCBHR8itEFd"
  alt_marty_address: "RD8WeYCaBQSx9e6mH5hX51uZ5FxNyirawj"

# ---------------------------------------------------------------------------
# SETUP — Runs before each test to ensure logged-in state
# ---------------------------------------------------------------------------
setup:
  prompt: |
    This is a Flutter web app rendered on an HTML canvas. Identify all elements visually.
    Wait 3 seconds for the app to fully load after the page appears.

    If you see a login screen with a password field:
      Enter the password 'QaTestPass!2026' in the password field.
      Click the login or unlock button.
      Wait until a dashboard or home screen with coin balances or a wallet overview appears.

    If you see a welcome screen with 'Create Wallet' and 'Import Wallet' buttons:
      COMPLETE — the app is at the initial state and no login is needed for this test.

    If you already see a dashboard with coin balances:
      COMPLETE — already logged in.

    COMPLETE when the dashboard or wallet overview is visible.
  success_criteria: "App is either on the dashboard (logged in) or the welcome screen"

# =============================================================================
# TESTS — Ordered by execution dependency and priority
# =============================================================================
tests:

  # ===========================================================================
  # PHASE 1: AUTH + WALLET LIFECYCLE (P0)
  # ===========================================================================

  - id: GW-AUTO-AUTH-001a
    name: "Create wallet — password and seed display"
    source_manual_id: GW-MAN-AUTH-001
    tags: [auth, critical, smoke, p0]
    max_steps: 25
    timeout: 240
    steps:
      - action: |
          Look for a button labeled 'Create Wallet' or 'Create New Wallet' on the welcome screen.
          Click it.
        checkpoint: "A password entry form appears with at least one password input field"
      - action: |
          Enter 'QaTestPass!2026' into the password field.
          If there is a 'Confirm Password' or second password field, enter the same password there.
          Click the continue, next, or create button.
        checkpoint: "A seed phrase screen appears showing 12 or 24 words arranged in a grid or numbered list"
      - action: |
          Read all the seed words displayed on screen. Do NOT click continue or next yet.
          Look for any warning text about backing up the seed phrase.
        checkpoint: "Seed words are visible on screen with a warning about backup"
      - action: |
          Look for a 'Continue', 'Next', 'I have backed up', or similar button.
          If there is a checkbox saying 'I have backed up my seed' or similar, check it first.
          Then click the continue/next button.
        checkpoint: "Either a seed confirmation challenge appears (asking to select words in order) or the dashboard loads"
    expected_result: "Wallet creation reaches seed display and progresses to confirmation or dashboard"
    extraction_schema:
      type: object
      properties:
        seed_words_visible:
          type: boolean
          description: "Whether seed words were displayed on screen"
        seed_word_count:
          type: integer
          description: "Number of seed words shown (12 or 24)"
        reached_confirmation_or_dashboard:
          type: boolean
          description: "Whether the flow progressed past seed display"

  - id: GW-AUTO-AUTH-001b
    name: "Create wallet — complete seed confirmation"
    source_manual_id: GW-MAN-AUTH-001
    tags: [auth, critical, smoke, p0]
    max_steps: 30
    timeout: 300
    prompt: |
      You are completing the wallet creation flow for a Gleec Wallet.
      If you see a seed confirmation challenge (asking you to select or enter specific seed words
      in a certain order), complete it by clicking the correct words in the correct order.
      The words should be visible on screen as clickable chips or buttons.

      If you see the dashboard already, COMPLETE — no confirmation was needed.

      After completing the confirmation, look for a 'Done', 'Finish', or similar button and click it.

      COMPLETE when the main dashboard or home screen appears showing coin balances,
      a wallet overview, or a coin list.
    expected_result: "Dashboard is visible after completing seed confirmation"
    extraction_schema:
      type: object
      properties:
        dashboard_visible:
          type: boolean
          description: "Whether the dashboard/home screen loaded"
        confirmation_challenge_present:
          type: boolean
          description: "Whether a seed confirmation challenge was shown"

  - id: GW-AUTO-AUTH-003
    name: "Import wallet from valid 12-word seed"
    source_manual_id: GW-MAN-AUTH-003
    tags: [auth, critical, p0]
    max_steps: 30
    timeout: 300
    steps:
      - action: |
          If on the welcome screen, click 'Import Wallet' or 'Restore Wallet'.
          If on the dashboard already, open the wallet manager (usually in a sidebar,
          top-left menu, or account icon), and look for 'Import' or 'Add Wallet' > 'Import'.
        checkpoint: "A seed phrase input screen appears with text fields or a text area for entering words"
      - action: |
          Enter the following 12-word seed phrase into the input fields:
          abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about

          If there are 12 separate input fields, enter one word per field in order.
          If there is a single text area, paste the entire phrase with spaces between words.
        checkpoint: "All 12 seed words are entered in the input fields"
      - action: |
          If a password field is shown, enter 'QaTestPass!2026' as the password.
          If a confirm password field is shown, enter the same password again.
          Click the 'Import', 'Restore', 'Continue', or 'Submit' button.
        checkpoint: "Either a loading/syncing indicator appears or the dashboard loads"
      - action: |
          Wait for the import to complete. Look for the dashboard or home screen.
          If you see a coin list or wallet overview, the import succeeded.
        checkpoint: "The dashboard is visible with a coin list or wallet overview"
    expected_result: "Wallet imported successfully and dashboard shows with coin list"
    extraction_schema:
      type: object
      properties:
        import_succeeded:
          type: boolean
          description: "Whether the wallet import completed"
        dashboard_visible:
          type: boolean
          description: "Whether the dashboard loaded after import"

  - id: GW-AUTO-AUTH-004
    name: "Invalid password attempts and lockout feedback"
    source_manual_id: GW-MAN-AUTH-004
    tags: [auth, critical, security, p0]
    max_steps: 20
    prompt: |
      You should be on the login/unlock screen with a password field.
      If not, look for a logout option in settings and log out first.

      Enter the wrong password 'WrongPassword1' and click the login/unlock button.
      Observe any error message that appears.

      Enter another wrong password 'WrongPassword2' and click login again.
      Observe any updated error message or lockout/cooldown indicator.

      Enter a third wrong password 'WrongPassword3' and click login.
      Look for any lockout message, cooldown timer, or additional security warning.

      COMPLETE after the third failed attempt. Report all error messages you see.
    expected_result: "Error messages shown for wrong passwords; possible lockout after multiple attempts"
    extraction_schema:
      type: object
      properties:
        error_messages:
          type: array
          items:
            type: string
          description: "All error messages shown during failed login attempts"
        lockout_triggered:
          type: boolean
          description: "Whether a lockout or cooldown was triggered"
        lockout_message:
          type: string
          description: "Text of any lockout/cooldown message shown"

  # ===========================================================================
  # PHASE 2: WALLET MANAGER (P0/P1)
  # ===========================================================================

  - id: GW-AUTO-WAL-001
    name: "Create second wallet + rename + switch"
    source_manual_id: GW-MAN-WAL-001
    tags: [wallet, critical, p0]
    max_steps: 30
    steps:
      - action: |
          From the dashboard, open the wallet manager. Look for a wallet icon,
          account selector, sidebar menu, or dropdown in the top area of the screen.
          Click it to open the wallet list or wallet management area.
        checkpoint: "A wallet list or wallet manager panel is visible"
      - action: |
          Look for a 'Create Wallet', 'Add Wallet', or '+' button and click it.
          If prompted, choose 'Create New' (not import).
          Enter a password if required ('QaTestPass!2026').
          Complete any seed backup flow shown (read words, confirm if needed).
        checkpoint: "A second wallet has been created and appears in the wallet list"
      - action: |
          Look for a rename, edit, or pencil icon next to one of the wallet names.
          If found, click it and rename the wallet to 'QA-Wallet-Primary'.
          If no inline rename exists, look in a wallet settings/detail screen.
        checkpoint: "One wallet is now named 'QA-Wallet-Primary' or a rename action was attempted"
      - action: |
          Switch between the wallets by clicking on the other wallet in the list.
          Observe that the dashboard content or coin balances change to reflect the selected wallet.
        checkpoint: "The dashboard or balance display changed after switching wallets"
    expected_result: "Two wallets exist, rename works, switching updates dashboard context"
    extraction_schema:
      type: object
      properties:
        second_wallet_created:
          type: boolean
        rename_successful:
          type: boolean
        switch_changed_content:
          type: boolean
        wallet_count:
          type: integer

  - id: GW-AUTO-WAL-002
    name: "Delete wallet with cancel and confirm"
    source_manual_id: GW-MAN-WAL-002
    tags: [wallet, critical, security, p0]
    max_steps: 25
    steps:
      - action: |
          Open the wallet manager. You should see at least two wallets.
          Look for a delete, trash, or remove icon/option on the non-active wallet.
          Click it.
        checkpoint: "A confirmation dialog appears asking to confirm wallet deletion"
      - action: |
          Click 'Cancel', 'No', or the X button to dismiss the confirmation dialog.
          Verify the wallet is still listed in the wallet manager.
        checkpoint: "The wallet is still present in the wallet list after canceling"
      - action: |
          Click the delete/remove option again for the same wallet.
          This time click 'Confirm', 'Delete', or 'Yes' to proceed.
        checkpoint: "The wallet has been removed from the list"
    expected_result: "Cancel preserves wallet; confirm removes it"
    extraction_schema:
      type: object
      properties:
        cancel_preserved_wallet:
          type: boolean
        confirm_deleted_wallet:
          type: boolean
        remaining_wallet_count:
          type: integer

  # ===========================================================================
  # PHASE 3: COIN MANAGEMENT + DASHBOARD (P1)
  # ===========================================================================

  - id: GW-AUTO-COIN-001
    name: "Enable test coins and activate DOC/MARTY"
    source_manual_id: GW-MAN-COIN-001
    tags: [coin, smoke, p1, prerequisite]
    max_steps: 25
    steps:
      - action: |
          Navigate to Settings. Look for a gear icon, 'Settings' in the sidebar menu,
          or an account/settings option in the navigation.
        checkpoint: "The settings page or settings menu is visible"
      - action: |
          Look for a toggle or switch labeled 'Test Coins', 'Show Test Coins',
          'Enable Test Coins', or 'Testnet'. Enable/turn on this toggle.
          If it is already enabled, proceed.
        checkpoint: "Test coins toggle is in the ON/enabled state"
      - action: |
          Navigate to the Coin Manager, Coins list, or 'Add Coins' section.
          Search for 'DOC' using any search or filter bar.
          If DOC appears, activate/enable it by clicking its toggle or add button.
        checkpoint: "DOC coin is now activated and appears in the active coins list"
      - action: |
          Search for 'MARTY' in the same coin manager.
          Activate/enable MARTY.
        checkpoint: "MARTY coin is now activated and appears in the active coins list"
    expected_result: "Test coins toggle is on; DOC and MARTY are both activated"
    extraction_schema:
      type: object
      properties:
        test_coins_enabled:
          type: boolean
        doc_activated:
          type: boolean
        marty_activated:
          type: boolean

  - id: GW-AUTO-COIN-002
    name: "Search, activate, deactivate coin with filter"
    source_manual_id: GW-MAN-COIN-002
    tags: [coin, p1]
    max_steps: 20
    prompt: |
      Navigate to the Coin Manager or coin list from the dashboard.

      If there is a search or filter bar, type 'MARTY' in it.
      Verify that MARTY appears in the results.

      If MARTY is currently deactivated/disabled, click its toggle or add button to activate it.
      If there is an 'active only' or 'enabled only' filter option, select it.
      Verify MARTY appears in the filtered list.

      Now deactivate MARTY by clicking its toggle or remove button.
      Verify MARTY is no longer in the 'active only' filtered list.
      Clear any filters.

      COMPLETE when you have confirmed MARTY can be activated and deactivated and
      the filter reflects the current state.
    expected_result: "MARTY activates/deactivates correctly and filters reflect state"
    extraction_schema:
      type: object
      properties:
        search_found_marty:
          type: boolean
        marty_toggleable:
          type: boolean
        filter_reflected_state:
          type: boolean

  - id: GW-AUTO-DASH-001
    name: "Hide balances and hide zero balances toggles"
    source_manual_id: GW-MAN-DASH-001
    tags: [dashboard, p1, smoke]
    max_steps: 20
    prompt: |
      Navigate to the main dashboard or wallet overview.
      You should see a list of coins with balance amounts.

      Look for a 'Hide Balances' toggle, eye icon, or privacy button on the dashboard.
      Click it to hide/mask balances.
      Verify that balance amounts are replaced with asterisks, dots, dashes, or a hidden indicator.

      Now look for a 'Hide Zero Balances' toggle or similar option.
      If found, enable it.
      Verify that coins with 0 balance are no longer shown in the list.

      Restore both toggles to their original state (show balances, show all coins).

      COMPLETE when both toggles have been tested and restored.
    expected_result: "Balances can be hidden/shown; zero-balance coins can be filtered"
    extraction_schema:
      type: object
      properties:
        hide_balances_works:
          type: boolean
        balances_masked_indicator:
          type: string
          description: "What replaced the balance values (e.g., '***', '---', etc.)"
        hide_zero_balances_works:
          type: boolean

  # ===========================================================================
  # PHASE 4: FAUCET FUNDING (P0 — prerequisite for money movement tests)
  # ===========================================================================

  - id: GW-AUTO-SEND-001
    name: "Faucet funding for DOC and MARTY"
    source_manual_id: GW-MAN-SEND-001
    tags: [send, critical, smoke, p0, prerequisite]
    max_steps: 25
    timeout: 240
    steps:
      - action: |
          Navigate to the DOC coin page by clicking on 'DOC' in the dashboard coin list
          or navigating to the DOC details/overview screen.
        checkpoint: "The DOC coin detail page is visible showing the DOC balance and/or address"
      - action: |
          Look for a 'Faucet', 'Get Test Coins', 'Request Funds', or tap icon that
          triggers the in-app faucet for DOC. Click it.
          Wait 5 seconds for the response.
        checkpoint: "A success message, toast, or snackbar appears confirming the faucet request"
      - action: |
          Navigate back to the dashboard, then open the MARTY coin page by clicking
          on 'MARTY' in the coin list.
        checkpoint: "The MARTY coin detail page is visible"
      - action: |
          Look for the same faucet/request button on the MARTY page. Click it.
          Wait 5 seconds for the response.
        checkpoint: "A success message appears for the MARTY faucet request"
    expected_result: "Both DOC and MARTY faucet requests succeeded"
    extraction_schema:
      type: object
      properties:
        doc_faucet_success:
          type: boolean
        doc_faucet_message:
          type: string
        marty_faucet_success:
          type: boolean
        marty_faucet_message:
          type: string

  - id: GW-AUTO-SEND-002a
    name: "Faucet cooldown/denied handling"
    source_manual_id: GW-MAN-SEND-002
    tags: [send, critical, p0]
    max_steps: 15
    prompt: |
      Navigate to the DOC coin page.
      Look for the faucet/request button and click it again immediately.
      You should see a cooldown, denied, rate-limited, or 'already requested' message.

      Report the exact text of any message shown.

      COMPLETE when you have observed the cooldown/denied response.
    expected_result: "Cooldown or denied message is shown for rapid repeat faucet request"
    extraction_schema:
      type: object
      properties:
        cooldown_message_shown:
          type: boolean
        message_text:
          type: string

  # ===========================================================================
  # PHASE 5: SEND / WITHDRAW (P0)
  # ===========================================================================

  - id: GW-AUTO-SEND-003
    name: "DOC send happy path"
    source_manual_id: GW-MAN-SEND-003
    tags: [send, critical, smoke, p0]
    max_steps: 25
    timeout: 240
    steps:
      - action: |
          Navigate to the DOC coin page and find the 'Send', 'Withdraw', or arrow-up button.
          Click it to open the send form.
        checkpoint: "A send form is visible with fields for recipient address and amount"
      - action: |
          Enter the recipient address 'RPDPE1XqGuHXSJn9q6VAaGDoRVMEwAYjT3' into the address/recipient field.
          Enter the amount '0.01' into the amount field.
        checkpoint: "Both fields are filled with the entered values"
      - action: |
          Click 'Next', 'Preview', 'Review', or 'Continue' to see the transaction summary.
          Look for a confirmation screen showing the amount, recipient, and fee.
        checkpoint: "A transaction summary or confirmation screen is visible showing amount, address, and fee"
      - action: |
          Click 'Confirm', 'Send', or 'Submit' to broadcast the transaction.
          Wait 5 seconds for confirmation feedback.
        checkpoint: "A success message, pending transaction indicator, or transaction hash is shown"
    expected_result: "Transaction submitted with success confirmation and visible in pending/history"
    extraction_schema:
      type: object
      properties:
        transaction_submitted:
          type: boolean
        success_or_pending_message:
          type: string
        fee_displayed:
          type: string
        transaction_hash:
          type: string
          description: "Transaction hash if visible"

  - id: GW-AUTO-SEND-004
    name: "Address validation — invalid and wrong-network"
    source_manual_id: GW-MAN-SEND-004
    tags: [send, critical, p0]
    max_steps: 20
    steps:
      - action: |
          Navigate to DOC send screen. Enter the invalid address 'RThisIsNotAValidAddress12345'
          in the recipient field. Enter amount '0.01'. Click send/next/continue.
        checkpoint: "A red error message appears mentioning invalid address, wrong format, or similar"
      - action: |
          Clear the address field. Enter the Ethereum address '0x742d35Cc6634C0532925a3b844Bc9e7595f2bD18'
          which is a wrong-network address for DOC. Click send/next/continue.
        checkpoint: "An error message appears about unsupported address format or wrong network"
    expected_result: "Both invalid and wrong-network addresses are blocked with error messages"
    extraction_schema:
      type: object
      properties:
        invalid_address_blocked:
          type: boolean
        invalid_address_error:
          type: string
        wrong_network_blocked:
          type: boolean
        wrong_network_error:
          type: string

  - id: GW-AUTO-SEND-005
    name: "Amount validation — zero, too small, exceeds balance"
    source_manual_id: GW-MAN-SEND-005
    tags: [send, critical, boundary, p0]
    max_steps: 25
    steps:
      - action: |
          Navigate to DOC send screen. Enter a valid DOC address in the recipient field.
          Enter '0' as the amount. Click send/next/continue.
        checkpoint: "An error message appears about amount being zero or must be greater than zero"
      - action: |
          Clear the amount field. Enter '0.000000001' as the amount (extremely small).
          Click send/next/continue.
        checkpoint: "An error message about minimum amount or insufficient value appears"
      - action: |
          Clear the amount field. Enter '999999999' as the amount (far exceeds balance).
          Click send/next/continue.
        checkpoint: "An error about insufficient funds or balance exceeded appears"
    expected_result: "Zero, sub-minimum, and over-balance amounts all blocked with errors"
    extraction_schema:
      type: object
      properties:
        zero_amount_error:
          type: string
        tiny_amount_error:
          type: string
        exceeds_balance_error:
          type: string

  # ===========================================================================
  # PHASE 6: DEX (P0)
  # ===========================================================================

  - id: GW-AUTO-DEX-001
    name: "Maker limit order creation"
    source_manual_id: GW-MAN-DEX-001
    tags: [dex, critical, smoke, p0]
    max_steps: 25
    steps:
      - action: |
          Navigate to the DEX section from the main menu or sidebar.
          Look for 'DEX', 'Exchange', 'Trade', or 'Swap' in the navigation.
        checkpoint: "The DEX trading interface is visible with pair selectors and order forms"
      - action: |
          Select the trading pair DOC/MARTY. Look for a pair selector or dropdown
          and choose DOC as the base and MARTY as the quote (or vice versa if that is how they are listed).
        checkpoint: "DOC/MARTY pair is selected and the orderbook or trading form reflects this pair"
      - action: |
          Look for a 'Maker', 'Limit', or 'Place Order' option.
          Enter a price of '1' (1 DOC = 1 MARTY or similar).
          Enter an amount of '0.1' in the amount field.
        checkpoint: "Price and amount fields are filled"
      - action: |
          Click 'Place Order', 'Submit', 'Create Order', or similar button.
          Wait 5 seconds for confirmation.
        checkpoint: "Order creation is confirmed with a success message or the order appears in an 'Open Orders' section"
    expected_result: "Maker order created and visible in open orders"
    extraction_schema:
      type: object
      properties:
        order_created:
          type: boolean
        order_visible_in_list:
          type: boolean
        order_details:
          type: object
          properties:
            pair:
              type: string
            price:
              type: string
            amount:
              type: string

  - id: GW-AUTO-DEX-003
    name: "DEX validation — invalid inputs"
    source_manual_id: GW-MAN-DEX-003
    tags: [dex, critical, boundary, p0]
    max_steps: 20
    steps:
      - action: |
          On the DEX trading screen with DOC/MARTY pair selected, enter '0' as the amount.
          Click the submit/place order button.
        checkpoint: "An error message about zero or invalid amount appears"
      - action: |
          Clear the amount field. Enter '999999999' as the amount (exceeds available balance).
          Click submit/place order.
        checkpoint: "An error about insufficient funds or balance appears"
    expected_result: "Zero and over-balance DEX orders are blocked with validation messages"
    extraction_schema:
      type: object
      properties:
        zero_amount_blocked:
          type: boolean
        zero_amount_error:
          type: string
        insufficient_funds_blocked:
          type: boolean
        insufficient_funds_error:
          type: string

  # ===========================================================================
  # PHASE 7: BRIDGE (P0)
  # ===========================================================================

  - id: GW-AUTO-BRDG-001
    name: "Bridge transfer happy path"
    source_manual_id: GW-MAN-BRDG-001
    tags: [bridge, critical, smoke, p0]
    max_steps: 25
    timeout: 240
    steps:
      - action: |
          Navigate to the Bridge section from the main menu or sidebar.
          Look for 'Bridge', 'Cross-chain', or a bridge icon in the navigation.
        checkpoint: "The bridge interface is visible with source/destination selectors"
      - action: |
          Select a supported source coin and destination. If DOC has a bridge route,
          select DOC as source. Look for available destination chains/coins and select one.
          Enter a valid amount like '0.1'.
        checkpoint: "Source, destination, and amount are all filled in"
      - action: |
          If a destination address field is shown, enter a valid recipient address.
          Click 'Preview', 'Next', or 'Review' to see the bridge transfer summary.
        checkpoint: "A summary showing amount, fees, estimated time, and route is displayed"
      - action: |
          Click 'Confirm', 'Bridge', or 'Submit' to initiate the bridge transfer.
          Wait 5 seconds for confirmation.
        checkpoint: "A success confirmation, pending status, or bridge tracking screen appears"
    expected_result: "Bridge transfer initiated with confirmation"
    extraction_schema:
      type: object
      properties:
        bridge_initiated:
          type: boolean
        status_message:
          type: string
        fee_displayed:
          type: string

  - id: GW-AUTO-BRDG-002
    name: "Unsupported bridge pair validation"
    source_manual_id: GW-MAN-BRDG-002
    tags: [bridge, critical, p0]
    max_steps: 15
    prompt: |
      Navigate to the Bridge section.
      Try to select a combination of source and destination that is not supported.
      Look for grayed-out options, 'not available', 'unsupported', or similar indicators.

      If all combinations appear available, try entering an amount and see if any
      pair-specific validation message appears.

      COMPLETE when you have identified how the bridge handles unsupported pairs.
    expected_result: "Unsupported pairs are blocked or marked unavailable"
    extraction_schema:
      type: object
      properties:
        unsupported_handling_exists:
          type: boolean
        blocking_message:
          type: string

  - id: GW-AUTO-BRDG-003
    name: "Bridge amount boundaries"
    source_manual_id: GW-MAN-BRDG-003
    tags: [bridge, critical, boundary, p0]
    max_steps: 20
    prompt: |
