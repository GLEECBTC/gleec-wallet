  # ===========================================================================
  # PHASE 21: COMPOSITE TESTS — formerly manual, now automated via
  # Playwright (browser-level offline, viewport, lifecycle) + Skyvern
  # ===========================================================================

  # --- NETWORK MANIPULATION TESTS ---

  - id: GW-AUTO-DASH-002
    name: "Balance refresh + offline indicator"
    source_manual_id: GW-MAN-DASH-002
    tags: [dashboard, network, composite]
    timeout: 300
    expected_result: "Offline indicator shown when network disabled; recovery on re-enable"
    phases:
      - type: skyvern
        action: "Verify dashboard loads with coin balances"
        prompt: |
          Navigate to the dashboard. Verify coin balances are visible and
          the page is fully loaded. Report the page state.
        expected: "Dashboard with balances visible"
      - type: playwright
        action: set_offline
      - type: os_call
        action: wait
        args: {seconds: 5}
      - type: skyvern
        action: "Check for offline indicator"
        prompt: |
          Look at the current screen. Is there an offline indicator, error
          banner, connection warning, or any visual cue that the app has lost
          connectivity? Report what you see.
        expected: "Offline indicator or error banner visible"
      - type: playwright
        action: set_online
      - type: os_call
        action: wait
        args: {seconds: 10}
      - type: skyvern
        action: "Verify recovery after network restore"
        prompt: |
          The network has been restored. Check if the dashboard has recovered:
          are balances visible again? Is there still an offline indicator?
          Report the current state.
        expected: "Dashboard recovered with balances visible"

  - id: GW-AUTO-SEND-006
    name: "Interrupted send + duplicate prevention"
    source_manual_id: GW-MAN-SEND-006
    tags: [send, network, critical, composite]
    timeout: 360
    expected_result: "Send initiated; network kill shows pending; recovery reconciles; no duplicates"
    phases:
      - type: skyvern
        action: "Navigate to DOC send and fill form"
        prompt: |
          Navigate to the DOC coin page and open the send form.
          Enter recipient address 'RPDPE1XqGuHXSJn9q6VAaGDoRVMEwAYjT3'
          and amount '0.001'. Click Send/Confirm to submit.
          Wait 2 seconds. Report the current state (pending, submitted, etc.).
        expected: "Transaction submitted or pending"
      - type: playwright
        action: set_offline
      - type: os_call
        action: wait
        args: {seconds: 5}
      - type: skyvern
        action: "Observe pending state during outage"
        prompt: |
          The network is now disabled. Look at the screen. Is there a pending
          transaction indicator, error message, or offline warning?
          Report exactly what you see.
        expected: "Pending state or error visible"
      - type: playwright
        action: set_online
      - type: os_call
        action: wait
        args: {seconds: 15}
      - type: skyvern
        action: "Verify recovery and no duplicate"
        prompt: |
          Network is restored. Navigate to the DOC transaction history.
          Check if the transaction status has reconciled (confirmed or failed).
          Count how many instances of this transaction appear.
          Report status and count.
        expected: "Transaction reconciled, exactly 1 instance"

  - id: GW-AUTO-ERR-001
    name: "Global network outage messaging"
    source_manual_id: GW-MAN-ERR-001
    tags: [error_handling, network, composite]
    timeout: 300
    expected_result: "Offline indicators on all screens; recovery with no stale spinners"
    phases:
      - type: playwright
        action: set_offline
      - type: os_call
        action: wait
        args: {seconds: 5}
      - type: skyvern
        action: "Check offline state across screens"
        prompt: |
          The network is disabled. Navigate through these screens in order:
          Dashboard, DEX, Bridge, Settings.
          For each screen, report whether you see an offline indicator, error
          message, or spinner. Note any crashes or blank screens.
        expected: "Offline indicators on screens, no crashes"
      - type: playwright
        action: set_online
      - type: os_call
        action: wait
        args: {seconds: 15}
      - type: skyvern
        action: "Verify full recovery"
        prompt: |
          Network is restored. Check Dashboard, DEX, Bridge screens.
          Are they showing live data again? Are there any stale spinners
          or error messages still stuck on screen?
