      - action: |
          Navigate to Settings > Security > Change Password.
          Enter the wrong current password 'WrongOldPass' and a new password 'NewPass2026!'.
          Click submit/save.
        checkpoint: "An error message appears about incorrect current password"
      - action: |
          Clear the fields. Enter the correct current password 'QaTestPass!2026'.
          Enter new password 'NewPass2026!' and confirm it.
          Click submit/save.
        checkpoint: "A success message appears confirming the password has been changed"
      - action: |
          IMPORTANT: Change the password back. Go to Change Password again.
          Enter current password 'NewPass2026!' and new password 'QaTestPass!2026'.
          Confirm and submit.
        checkpoint: "Password has been reverted to the original for subsequent tests"
    expected_result: "Wrong current password rejected; valid change succeeds; password reverted"
    extraction_schema:
