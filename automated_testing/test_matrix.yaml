  - id: GW-AUTO-COIN-003
    name: "Deactivate coin with balance — warning and restore"
    source_manual_id: GW-MAN-COIN-003
    tags: [coin, p1]
    max_steps: 20
    steps:
      - action: |
          Navigate to the Coin Manager. Find DOC in the active coins list.
          DOC should have a non-zero balance from earlier faucet funding.
        checkpoint: "DOC is visible in the active coins list with a balance > 0"
      - action: |
          Click the toggle or remove button next to DOC to deactivate it.
          A warning dialog should appear about deactivating a coin with a balance.
        checkpoint: "A warning dialog is shown mentioning the coin has a balance"
      - action: |
          Click 'Cancel' or 'No' to dismiss the warning. DOC should remain active.
        checkpoint: "DOC is still in the active coins list"
      - action: |
          Click deactivate again. This time confirm the deactivation.
          Then re-activate DOC by finding it in the inactive list and enabling it.
        checkpoint: "DOC is back in the active coins list"
    expected_result: "Warning shown for balance coin; cancel preserves; reactivation works"
    extraction_schema:
